version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: new-api-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: newapi
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
